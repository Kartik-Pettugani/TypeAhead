<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeAhead — Search Suggestions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #faf9f6;
            --card-bg: #ffffff;
            --border: #e0ddd7;
            --border-focus: #bbb7af;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --text-muted: #9aa0a6;
            --accent: #3c3a36;
            --accent-light: #f1eeea;
            --success: #3a7d5c;
            --highlight: #8b7355;
            --shadow-sm: 0 1px 6px rgba(32, 33, 36, 0.08);
            --shadow-md: 0 2px 12px rgba(32, 33, 36, 0.12);
            --shadow-lg: 0 4px 20px rgba(32, 33, 36, 0.14);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── Hero area: vertically centered search ── */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem 1rem;
            transition: justify-content 0.3s ease;
        }

        /* When suggestions are visible, push content up */
        .hero.shifted {
            justify-content: flex-start;
            padding-top: 12vh;
        }

        /* ── Logo ── */
        .logo {
            margin-bottom: 2rem;
            text-align: center;
            user-select: none;
        }

        .logo h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text-primary);
        }

        .logo h1 span {
            color: var(--highlight);
        }

        .logo p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            font-weight: 400;
        }

        /* ── Search bar ── */
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 0 0.5rem 0 1.15rem;
            height: 48px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .search-bar:hover {
            box-shadow: var(--shadow-md);
        }

        .search-bar:focus-within {
            box-shadow: var(--shadow-md);
            border-color: var(--border-focus);
        }

        .search-bar.has-suggestions {
            border-radius: 24px 24px 0 0;
            border-bottom-color: transparent;
            box-shadow: var(--shadow-lg);
        }

        .search-icon {
            color: var(--text-muted);
            flex-shrink: 0;
            margin-right: 0.65rem;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 0.95rem;
            font-family: var(--font);
            color: var(--text-primary);
            background: transparent;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-submit-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .search-submit-btn:hover {
            background: #2a2520;
            transform: scale(1.05);
        }

        /* ── Suggestions dropdown ── */
        .suggestions-dropdown {
            position: absolute;
            top: 48px;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-top: 1px solid #eee;
            border-radius: 0 0 24px 24px;
            max-height: 380px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            display: none;
            padding-bottom: 0.35rem;
        }

        .suggestion-item {
            padding: 0.6rem 1.15rem;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: background 0.1s ease;
        }

        .suggestion-item:hover,
        .suggestion-item.highlighted {
            background: var(--accent-light);
        }

        .suggestion-item .suggestion-icon {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .suggestion-item .suggestion-text {
            flex: 1;
        }

        /* ── Mode toggle pills ── */
        .mode-toggle {
            display: flex;
            margin-top: 1.25rem;
            gap: 0.35rem;
        }

        .mode-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 0.4rem 1rem;
            font-family: var(--font);
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .mode-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .mode-btn:not(.active):hover {
            background: var(--accent-light);
            border-color: var(--border-focus);
        }

        /* ── Trending chips ── */
        .trending-section {
            margin-top: 1.75rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .trending-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .trending-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            justify-content: center;
        }

        .trending-chip {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: var(--shadow-sm);
        }

        .trending-chip:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* ── Bottom status bar ── */
        .status-bar {
            border-top: 1px solid var(--border);
            background: var(--card-bg);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1.75rem;
            flex-wrap: wrap;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.72rem;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.green {
            color: var(--success);
        }

        .stat-value.warm {
            color: var(--highlight);
        }

        .node-badge {
            display: inline-flex;
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .node-badge.redis-1 {
            background: rgba(139, 115, 85, 0.1);
            border: 1px solid #8b7355;
            color: #8b7355;
        }

        .node-badge.redis-2 {
            background: rgba(58, 125, 92, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .node-badge.redis-3 {
            background: rgba(100, 130, 160, 0.1);
            border: 1px solid #6482a0;
            color: #6482a0;
        }

        .node-badge.unmapped {
            background: var(--accent-light);
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        /* Hidden elements for JS compatibility */
        #batch-indicator,
        #output-content {
            display: none;
        }

        /* Log panel — hidden by default, very minimal */
        .log-strip {
            padding: 0.75rem 1.5rem;
            background: var(--accent-light);
            border-top: 1px solid var(--border);
            overflow: hidden;
        }

        .logs-panel-small {
            height: 80px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-left: 3px solid var(--success);
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.82rem;
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            max-width: 340px;
        }

        .toast .toast-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .toast .toast-msg {
            flex: 1;
            line-height: 1.35;
        }

        .toast .toast-msg strong {
            font-weight: 600;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }

            to {
                opacity: 0;
                transform: translateX(20px);
            }
        }

        /* Search bar success flash */
        .search-bar.submitted {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(58, 125, 92, 0.12);
        }
    </style>
</head>

<body>

    <!-- Hero Section -->
    <section class="hero" id="hero-section">

        <div class="logo">
            <h1>Type<span>Ahead</span></h1>
            <p>Distributed Search Suggestion Engine</p>
        </div>

        <!-- Search bar with inline suggestions -->
        <div class="search-wrapper">
            <div class="search-bar" id="search-bar">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Start typing to search..."
                    autocomplete="off" oninput="onInputChanged(event)" onkeydown="onInputKeyDown(event)">
                <button class="search-submit-btn" onclick="submitSearch()" aria-label="Search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Suggestions flow right under the bar -->
            <div id="suggestions-dropdown" class="suggestions-dropdown"></div>
        </div>

        <!-- Ranking mode toggle -->
        <div class="mode-toggle">
            <button id="btn-basic-ranking" class="mode-btn" onclick="setRankingMode('basic')">Basic Ranking</button>
            <button id="btn-enhanced-ranking" class="mode-btn active" onclick="setRankingMode('enhanced')">Enhanced
                Ranking</button>
        </div>

        <!-- Trending -->
        <div class="trending-section">
            <div class="trending-label">Trending</div>
            <div id="trending-chips-container" class="trending-chips"></div>
        </div>
    </section>

    <!-- Hidden state elements for JS -->
    <span id="batch-indicator">Ready</span>
    <span id="output-content"></span>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Bottom telemetry strip -->
    <footer class="status-bar">
        <div class="stat">
            <span class="stat-label">Cache Hit</span>
            <span id="metric-hit-rate" class="stat-value green">0.00%</span>
        </div>
        <div class="stat">
            <span class="stat-label">p95 Latency</span>
            <span id="metric-latency" class="stat-value warm">0.0 ms</span>
        </div>
        <div class="stat">
            <span class="stat-label">Write Reduction</span>
            <span id="metric-write-reduction" class="stat-value green">0.00%</span>
        </div>
        <div class="stat">
            <span class="stat-label">Node</span>
            <span id="debug-node-indicator" class="node-badge unmapped">None</span>
        </div>
    </footer>

    <!-- Tiny log strip -->
    <div class="log-strip">
        <div id="logs-panel" class="logs-panel-small">
            <div>[System] Ready</div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Extend: shift hero upward when suggestions appear
        const searchBar = document.getElementById('search-bar');
        const heroSection = document.getElementById('hero-section');
        const toastContainer = document.getElementById('toast-container');
        const origRender = renderSuggestions;
        const origHide = hideDropdown;

        renderSuggestions = function (list) {
            origRender(list);
            if (list.length > 0) {
                searchBar.classList.add('has-suggestions');
                heroSection.classList.add('shifted');
            }
        };

        hideDropdown = function () {
            origHide();
            searchBar.classList.remove('has-suggestions');
            heroSection.classList.remove('shifted');
        };

        // Show toast notification
        function showToast(query, message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <span class="toast-icon">✓</span>
                <span class="toast-msg"><strong>"${escapeHtml(query)}"</strong> — ${escapeHtml(message)}</span>
            `;
            toastContainer.appendChild(toast);
            // Remove after animation
            setTimeout(() => toast.remove(), 3000);
        }

        // Override submitSearch for visual feedback
        const origSubmit = submitSearch;
        submitSearch = async function () {
            const val = searchInput.value.trim();
            if (!val) return;

            hideDropdown();

            // Flash the search bar
            searchBar.classList.add('submitted');
            setTimeout(() => searchBar.classList.remove('submitted'), 1200);

            try {
                const response = await fetch('/select?q=' + encodeURIComponent(val), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: val })
                });
                const data = await response.json();

                // Update hidden elements for compatibility
                outputContent.textContent = data.message || JSON.stringify(data);
                batchIndicator.textContent = 'Buffered';

                // Show toast
                showToast(val, data.message || 'Search recorded');
                logEvent(`[Search] "${val}" submitted successfully.`);

                // Refresh trending
                fetchTrending();
            } catch (err) {
                showToast(val, 'Failed to submit');
                logEvent(`Search failed: ${err.message}`);
            }
        };
    </script>
</body>

</html>
